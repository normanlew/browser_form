<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broswer Form</title>
    <script src="javascript.js" defer></script>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <div class="container">
        <form action="" method="post" id="form_browser" novalidate>
    <!-- Email, Country, Postal Code, Password and Password Confirmation fields -->
            <label for="mail">Email: </label>
            <input type="email" id="mail" name="mail" required minlength="8" />

            <label for="country">Country: </label>
            <input type="text" id="country" name="country" required minlength="2" />

            <label for="postal">Postal Code: </label>
            <input type="text" id="postal" name="postal" required minlength="5" />

            <label for="pass">Password: </label>
            <input type="password" id="pass" name="pass" required minlength="10" />

            <label for="pass_confirm">Confirm Password: </label>
            <input type="password" id="pass_confirm" name="pass_confirm" required />

            <button onclick="checkIfValid()">Submit</button>

            <div id="err_msg">

            </div>
        </form>
    </div>
</body>
</html>
